<!DOCTYPE html>
<html lang="pl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>

    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/bdcb6a0802.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <form name="myForm"
          action="/search"
          method="POST"
          onsubmit="return validateForm()">

        {{if .PlaybackName}}
        <div class="song-container">

            <img src="{{.PlaybackImage}}" alt="{{.PlaybackName}}">

            <div class="bottom-box">

                <div class="title-container">

                    <h2>{{.PlaybackName}}</h2>

                    <p>
                        {{if .PlaybackEx}}
                        <span class="ex">E</span>
                        {{end}}

                        {{.PlaybackArtist}}
                    </p>

                </div>

                <div class="boxContainer">
                    <div class="box box1"></div>
                    <div class="box box2"></div>
                    <div class="box box3"></div>
                    <div class="box box4"></div>
                    <div class="box box5"></div>
                </div>

            </div>

        </div>
        {{end}}

        <div class="input-container">

            <div class="input-box">

                <input
                    id="input-song"
                    class="first"
                    type="text"
                    name="song"
                    placeholder="Nazwa lub link Spotify"
                    required
                >

                <input
                    class="second"
                    type="submit"
                    value="Dodaj"
                >

            </div>

        </div>

    </form>

</div>

<script>
function validateForm() {

    const value = document.forms["myForm"]["song"].value;

    if (value.trim() === "") {

        document.getElementById("input-song").style.borderColor = "red";

        return false;
    }

    return true;
}
</script>

<script>
const canvas = document.createElement("canvas");

canvas.style.position = "fixed";
canvas.style.top = "0";
canvas.style.left = "0";
canvas.style.zIndex = "-1";
canvas.style.pointerEvents = "none";

document.body.appendChild(canvas);

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

const gl = canvas.getContext("webgl");

if (gl) {

    const numMetaballs = window.innerWidth < 768 ? 12 : 30;

    const metaballs = [];

    for (let i = 0; i < numMetaballs; i++) {

        const radius = Math.random() * 60 + 10;

        metaballs.push({
            x: Math.random() * (width - 2 * radius) + radius,
            y: Math.random() * (height - 2 * radius) + radius,
            vx: (Math.random() - 0.5) * 3,
            vy: (Math.random() - 0.5) * 3,
            r: radius * 0.75
        });
    }

    const vertexShaderSrc = `
    attribute vec2 position;

    void main() {
        gl_Position = vec4(position, 0.0, 1.0);
    }
    `;

    const fragmentShaderSrc = `
    precision highp float;

    const float WIDTH = ${width.toFixed(0)}.0;
    const float HEIGHT = ${height.toFixed(0)}.0;

    uniform vec3 metaballs[${numMetaballs}];

    void main() {

        float x = gl_FragCoord.x;
        float y = gl_FragCoord.y;

        float sum = 0.0;

        for(int i = 0; i < ${numMetaballs}; i++) {

            vec3 metaball = metaballs[i];

            float dx = metaball.x - x;
            float dy = metaball.y - y;

            float radius = metaball.z;

            sum += (radius * radius) / (dx * dx + dy * dy);
        }

        if(sum >= 0.99) {

            gl_FragColor = vec4(
                mix(
                    vec3(x / WIDTH, y / HEIGHT, 1.0),
                    vec3(0.0, 0.0, 0.0),
                    max(0.0, 1.0 - (sum - 0.99) * 100.0)
                ),
                1.0
            );

            return;
        }

        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
    }
    `;

    function compileShader(source, type) {

        const shader = gl.createShader(type);

        gl.shaderSource(shader, source);
        gl.compileShader(shader);

        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            throw gl.getShaderInfoLog(shader);
        }

        return shader;
    }

    const vertexShader = compileShader(
        vertexShaderSrc,
        gl.VERTEX_SHADER
    );

    const fragmentShader = compileShader(
        fragmentShaderSrc,
        gl.FRAGMENT_SHADER
    );

    const program = gl.createProgram();

    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);

    gl.linkProgram(program);
    gl.useProgram(program);

    const vertexData = new Float32Array([
        -1, 1,
        -1,-1,
         1, 1,
         1,-1
    ]);

    const buffer = gl.createBuffer();

    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, vertexData, gl.STATIC_DRAW);

    const position = gl.getAttribLocation(program, "position");

    gl.enableVertexAttribArray(position);

    gl.vertexAttribPointer(
        position,
        2,
        gl.FLOAT,
        false,
        0,
        0
    );

    const metaballsHandle =
        gl.getUniformLocation(program, "metaballs");

    function render() {

        for (const mb of metaballs) {

            mb.x += mb.vx;
            mb.y += mb.vy;

            if (mb.x < mb.r || mb.x > width - mb.r)
                mb.vx *= -1;

            if (mb.y < mb.r || mb.y > height - mb.r)
                mb.vy *= -1;
        }

        const gpuData =
            new Float32Array(3 * numMetaballs);

        for (let i = 0; i < numMetaballs; i++) {

            gpuData[i * 3] = metaballs[i].x;
            gpuData[i * 3 + 1] = metaballs[i].y;
            gpuData[i * 3 + 2] = metaballs[i].r;
        }

        gl.uniform3fv(metaballsHandle, gpuData);

        gl.drawArrays(
            gl.TRIANGLE_STRIP,
            0,
            4
        );

        requestAnimationFrame(render);
    }

    render();

    window.addEventListener("resize", () => {

        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;

        gl.viewport(0, 0, width, height);
    });
}
</script>

</body>
</html>
